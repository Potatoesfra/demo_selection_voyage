{% extends "base.html" %}
{% block title %}Admin Login — TripVote{% endblock %}

{% block content %}
<div class="fade-up" style="max-width:380px; margin:100px auto;">
  <div class="card p-8">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:2rem; margin-bottom:10px;">⚡</div>
      <h1 style="font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem;">Accès Admin</h1>
      <p style="color:var(--muted); font-size:0.85rem; margin-top:6px;">Entrez le mot de passe administrateur</p>
    </div>

    {% if error %}
    <div style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:10px 14px; margin-bottom:16px; color:#F87171; font-size:0.85rem; text-align:center;">
      Mot de passe incorrect
    </div>
    {% endif %}

    <form action="/admin/login" method="POST">
      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:0.82rem; color:var(--muted); margin-bottom:6px;">Mot de passe</label>
        <input type="password" name="password" class="input-field" placeholder="••••••••" autofocus required>
      </div>
      <button type="submit" class="btn-primary" style="width:100%; text-align:center;">Connexion →</button>
    </form>

    <div style="text-align:center; margin-top:16px;">
      <a href="/" style="color:var(--muted); font-size:0.82rem;">← Retour à l'accueil</a>
    </div>
  </div>
</div>
{% endblock %}
